name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Prepare standalone files
        run: |
          mkdir -p deploy/public
          mkdir -p deploy/.next/static
          cp -r .next/standalone/* deploy/
          cp -r public/* deploy/public/
          cp -r .next/static deploy/.next/

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "deploy/"
          TARGET: ${{ secrets.REMOTE_TARGET }}
          EXCLUDE: "/node_modules/, /.git/, /.github/"

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.REMOTE_TARGET }}
            # Check if PM2 is installed, if not, try to install it globally
            if ! command -v pm2 &> /dev/null; then
              echo "PM2 not found. Attempting to install..."
              # Assuming the user has npm and permissions, or we use npx for a one-off
              npm install -g pm2 || echo "Failed to install PM2 globally. Trying with npx..."
            fi
            
            # Use PM2 to restart or start the standalone server
            if command -v pm2 &> /dev/null; then
              pm2 restart tenants-frontend || pm2 start node --name "tenants-frontend" -- server.js
              pm2 save
            else
              echo "PM2 still not found. Starting with node in background as fallback..."
              nohup node server.js > app.log 2>&1 &
            fi
